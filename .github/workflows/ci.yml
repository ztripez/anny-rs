name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  check:
    name: ${{ matrix.kind }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        kind: [build, test, clippy, fmt, doc]
    steps:
      # The Rust crate's Cargo.toml is at the repo root. Several integration
      # tests reference the upstream Anny Python data via `..`, so we lay
      # things out as `<workspace>/anny-rs/` (this repo) +
      # `<workspace>/anny/` (the upstream).
      - name: Checkout anny-rs
        uses: actions/checkout@v4
        with:
          path: anny-rs
      - name: Checkout naver/anny (data dependency)
        if: matrix.kind == 'build' || matrix.kind == 'test'
        uses: actions/checkout@v4
        with:
          repository: naver/anny
          path: anny

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: anny-rs

      - name: cargo fmt --check
        if: matrix.kind == 'fmt'
        working-directory: anny-rs
        run: cargo fmt --all --check

      - name: cargo build (default features)
        if: matrix.kind == 'build'
        working-directory: anny-rs
        run: cargo build --verbose

      - name: cargo build (smplx-download feature)
        if: matrix.kind == 'build'
        working-directory: anny-rs
        run: cargo build --features smplx-download --verbose

      # Debug tests skip release-only ignored tests automatically. The
      # data_loaders integration test does need the upstream Anny data
      # to be checked out at <workspace>/anny/ (done above).
      - name: cargo test (default features)
        if: matrix.kind == 'test'
        working-directory: anny-rs
        run: cargo test --verbose

      - name: cargo test (smplx-download feature)
        if: matrix.kind == 'test'
        working-directory: anny-rs
        run: cargo test --features smplx-download --verbose

      - name: cargo clippy
        if: matrix.kind == 'clippy'
        working-directory: anny-rs
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo doc
        if: matrix.kind == 'doc'
        working-directory: anny-rs
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --features smplx-download --no-deps
